<style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
    .sakura-root {
      position: relative;
      width: 100%;
      height: 540px;
      background: transparent;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }
    .mist {
      position: absolute;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      filter: blur(18px);
      animation: drift linear infinite;
    }
    @keyframes drift {
      from { transform: translateX(-120%); }
      to   { transform: translateX(200%); }
    }
    .loading-sublabel {
      font-family: 'Noto Serif JP', serif;
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 4px;
      color: rgba(245,230,211,0.4);
      margin-top: 0;
      position: relative;
      z-index: 10;
      text-transform: uppercase;
    }
    .petal {
      position: absolute;
      top: -20px;
      animation: fall linear infinite;
      opacity: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(0px) rotate(0deg); opacity: 0; }
      5%   { opacity: 1; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(560px) rotate(720deg); opacity: 0; }
    }
    .torii {
      position: relative;
      z-index: 10;
      filter: drop-shadow(0 0 18px rgba(193,26,34,0.45));
      animation: breathe 3s ease-in-out infinite alternate;
    }
    @keyframes breathe {
      from { filter: drop-shadow(0 0 12px rgba(193,26,34,0.35)); }
      to   { filter: drop-shadow(0 0 28px rgba(193,26,34,0.65)); }
    }
    .loading-label {
      font-family: 'Noto Serif JP', serif;
      font-weight: 200;
      font-size: 13px;
      letter-spacing: 6px;
      color: rgba(245,230,211,0.7);
      margin-top: 22px;
      position: relative;
      z-index: 10;
      text-transform: uppercase;
    }
    .loading-dots span { animation: blink 1.4s infinite; opacity: 0; }
    .loading-dots span:nth-child(2) { animation-delay: 0.3s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.6s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }
    .kanji-watermark {
      position: absolute;
      bottom: 18px;
      right: 22px;
      font-family: 'Noto Serif JP', serif;
      font-size: 42px;
      font-weight: 200;
      color: rgba(193,26,34,0.12);
      z-index: 1;
      user-select: none;
    }
</style>

<div class="sakura-root" id="sakuraRoot">
    <div class="mist" style="width:380px; top:38%; animation-duration:18s; animation-delay:0s;"></div>
    <div class="mist" style="width:260px; top:55%; animation-duration:24s; animation-delay:-9s;"></div>
    <div class="mist" style="width:300px; top:72%; animation-duration:20s; animation-delay:-4s;"></div>

    <svg class="torii" width="140" height="130" viewBox="0 0 140 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4"   y="18" width="132" height="12" rx="2" fill="#C91A22"/>
        <rect x="12"  y="10" width="116" height="10" rx="2" fill="#C91A22"/>
        <rect x="0"   y="24" width="140" height="6"  rx="1" fill="#a01318" opacity="0.5"/>
        <rect x="22"  y="30" width="12"  height="90" rx="2" fill="#C91A22"/>
        <rect x="106" y="30" width="12"  height="90" rx="2" fill="#C91A22"/>
        <rect x="26"  y="52" width="88"  height="6"  rx="1" fill="#C91A22" opacity="0.6"/>
    </svg>

    <p class="loading-label">
        読み込み中<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>
    </p>
    <p class="loading-sublabel">please wait, This could take upto 10 minutes</p>
    <div class="kanji-watermark">絆</div>
</div>

<script>
    const root = document.getElementById('sakuraRoot');
    const colors = ['#ffb7c5','#ff8fab','#e75480','#ffccd5','#f9a8c9'];
    const petal = (c) => `<svg width="14" height="12" viewBox="0 0 14 12" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="4" cy="6" rx="4" ry="2.5" fill="${c}" opacity="0.85" transform="rotate(-20 4 6)"/>
      <ellipse cx="10" cy="6" rx="4" ry="2.5" fill="${c}" opacity="0.75" transform="rotate(20 10 6)"/>
    </svg>`;
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('div');
      el.className = 'petal';
      el.innerHTML = petal(colors[i % colors.length]);
      el.style.left = (Math.random() * 96) + '%';
      el.style.animationDuration = (4.5 + Math.random() * 5) + 's';
      el.style.animationDelay = (-Math.random() * 8) + 's';
      el.style.transform = `scale(${0.7 + Math.random() * 0.7})`;
      root.appendChild(el);
    }
</script>
