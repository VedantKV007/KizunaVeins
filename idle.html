<style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
    .ki-root {
      width: 100%;
      height: 540px;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .ki-stars { position: absolute; inset: 0; pointer-events: none; }
    .ki-mist {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.02); pointer-events: none;
      animation: mistDrift linear infinite;
    }
    @keyframes mistDrift {
      from { transform: translateX(-200px); opacity: 0; }
      10% { opacity: 1; } 90% { opacity: 1; }
      to { transform: translateX(900px); opacity: 0; }
    }
    .ki-petal {
      position: absolute; top: -16px; pointer-events: none;
      animation: petalFall linear infinite; opacity: 0;
    }
    @keyframes petalFall {
      0%   { transform: translateY(0) rotate(0deg) translateX(0px);    opacity: 0; }
      5%   { opacity: 0.9; }
      50%  { transform: translateY(260px) rotate(180deg) translateX(18px); }
      95%  { opacity: 0.5; }
      100% { transform: translateY(560px) rotate(400deg) translateX(-12px); opacity: 0; }
    }
    .ki-mountain { position: absolute; bottom: 0; left: 0; width: 100%; pointer-events: none; }
    .ki-torii-wrap {
      position: relative; z-index: 10;
      animation: toriiPulse 4s ease-in-out infinite alternate;
    }
    @keyframes toriiPulse {
      from { filter: drop-shadow(0 0 10px rgba(201,26,34,0.4)) drop-shadow(0 0 30px rgba(201,26,34,0.15)); }
      to   { filter: drop-shadow(0 0 20px rgba(201,26,34,0.7)) drop-shadow(0 0 50px rgba(201,26,34,0.25)); }
    }
    .ki-title-block { position: relative; z-index: 10; text-align: center; margin-top: 28px; }
    .ki-title {
      font-family: 'Noto Serif JP', serif; font-size: 52px; font-weight: 200;
      letter-spacing: 6px; color: #f0e8dc; line-height: 1; margin: 0;
    }
    .ki-kanji { color: #C91A22; font-weight: 300; }
    .ki-subtitle {
      font-family: 'Noto Serif JP', serif; font-size: 11px; font-weight: 200;
      letter-spacing: 5px; color: rgba(200,185,168,0.55);
      margin-top: 10px; text-transform: uppercase;
    }
    .ki-divider {
      width: 60px; height: 1px; background: rgba(201,26,34,0.4);
      margin: 22px auto 0; position: relative; z-index: 10;
    }
    .ki-pills {
      display: flex; gap: 10px; margin-top: 22px; position: relative; z-index: 10;
      flex-wrap: wrap; justify-content: center; padding: 0 24px;
    }
    .ki-pill {
      font-family: 'Noto Serif JP', serif; font-size: 10px; font-weight: 300;
      letter-spacing: 3px; color: rgba(200,185,168,0.45);
      border: 0.5px solid rgba(201,26,34,0.25); border-radius: 2px;
      padding: 5px 14px; text-transform: uppercase;
    }
    .ki-prompt {
      position: relative; z-index: 10; margin-top: 30px;
      font-family: 'Noto Serif JP', serif; font-size: 11px; font-weight: 200;
      color: rgba(200,185,168,0.3); letter-spacing: 3px; text-align: center;
      animation: promptBlink 3s ease-in-out infinite;
    }
    @keyframes promptBlink {
      0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; }
    }
</style>

<div class="ki-root" id="kiRoot">
    <svg class="ki-stars" id="kiStars"></svg>

    <div class="ki-mist" style="width:480px;height:80px;top:30%;animation-duration:26s;animation-delay:0s;"></div>
    <div class="ki-mist" style="width:320px;height:60px;top:48%;animation-duration:34s;animation-delay:-14s;"></div>
    <div class="ki-mist" style="width:560px;height:70px;top:65%;animation-duration:28s;animation-delay:-8s;"></div>

    <svg class="ki-mountain" viewBox="0 0 800 180" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,180 200,180 350,60 500,180 640,180 720,90 800,180" fill="#09070f" opacity="0.9"/>
        <polygon points="0,180 100,180 220,100 340,180 460,180 560,110 680,180 800,180" fill="#05040a" opacity="0.95"/>
        <line x1="350" y1="62" x2="350" y2="45" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
        <polygon points="342,62 350,38 358,62" fill="rgba(255,255,255,0.08)"/>
    </svg>

    <div class="ki-torii-wrap">
        <svg width="110" height="105" viewBox="0 0 110 105" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3"  y="14" width="104" height="10" rx="2" fill="#C91A22"/>
            <rect x="10" y="7"  width="90"  height="9"  rx="2" fill="#C91A22"/>
            <rect x="0"  y="20" width="110" height="4"  rx="1" fill="#8a1218" opacity="0.6"/>
            <rect x="17" y="24" width="10"  height="72" rx="2" fill="#C91A22"/>
            <rect x="83" y="24" width="10"  height="72" rx="2" fill="#C91A22"/>
            <rect x="20" y="42" width="70"  height="5"  rx="1" fill="#C91A22" opacity="0.55"/>
            <rect x="26" y="92" width="4"   height="4"  rx="1" fill="#8a1218" opacity="0.7"/>
            <rect x="80" y="92" width="4"   height="4"  rx="1" fill="#8a1218" opacity="0.7"/>
        </svg>
    </div>

    <div class="ki-title-block">
        <p class="ki-title">Kizuna <span class="ki-kanji">絆</span></p>
        <p class="ki-subtitle">Multi-Agent Procurement Intelligence</p>
    </div>

    <div class="ki-divider"></div>

    <div class="ki-pills">
        <div class="ki-pill">Risk Detection</div>
        <div class="ki-pill">Financial Analysis</div>
        <div class="ki-pill">Compliance</div>
        <div class="ki-pill">Due Diligence</div>
    </div>

    <p class="ki-prompt">&#8592; Enter target entity to begin</p>
</div>

<script>
    const root = document.getElementById('kiRoot');
    const starsEl = document.getElementById('kiStars');
    starsEl.setAttribute('viewBox', '0 0 800 540');
    starsEl.setAttribute('preserveAspectRatio', 'xMidYMid slice');
    let s = '';
    for (let i = 0; i < 90; i++) {
      const x = (Math.random() * 800).toFixed(1);
      const y = (Math.random() * 380).toFixed(1);
      const r = (0.4 + Math.random() * 0.9).toFixed(1);
      const o = (0.2 + Math.random() * 0.5).toFixed(2);
      s += `<circle cx="${x}" cy="${y}" r="${r}" fill="white" opacity="${o}"/>`;
    }
    starsEl.innerHTML = s;

    const colors = ['#ffb7c5','#ff8fab','#f9a8c9','#ffccd5','#e75480'];
    const p = (c) => `<svg width="13" height="11" viewBox="0 0 13 11" xmlns="http://www.w3.org/2000/svg"><ellipse cx="3.5" cy="5.5" rx="3.5" ry="2.2" fill="${c}" opacity="0.8" transform="rotate(-18 3.5 5.5)"/><ellipse cx="9.5" cy="5.5" rx="3.5" ry="2.2" fill="${c}" opacity="0.7" transform="rotate(18 9.5 5.5)"/></svg>`;
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'ki-petal';
      el.innerHTML = p(colors[i % colors.length]);
      el.style.left = (Math.random() * 95) + '%';
      el.style.animationDuration = (5 + Math.random() * 6) + 's';
      el.style.animationDelay = (-Math.random() * 10) + 's';
      el.style.transform = `scale(${(0.6 + Math.random() * 0.8).toFixed(2)})`;
      root.appendChild(el);
    }
</script>
